name: Release

# Trigger: pushing a tag like v0.7.73 builds a signed release APK and
# publishes it to GitHub Releases. Also supports manual dispatch with
# an explicit version for hotfixes.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v0.7.73)'
        required: true

permissions:
  contents: write  # required to create releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::KEYSTORE_BASE64 secret is missing."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.keystore"
          echo "SIGNING_STORE_FILE=$RUNNER_TEMP/keystore/release.keystore" >> "$GITHUB_ENV"

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is missing."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > composeApp/google-services.json

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :composeApp:assembleFullRelease --no-daemon --stacktrace

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(find composeApp/build/outputs/apk/full/release -name '*.apk' -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "::error::No APK produced."
            exit 1
          fi
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $APK_PATH)" >> "$GITHUB_OUTPUT"

      - name: Verify APK signature
        run: |
          BUILD_TOOLS_DIR=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n 1)
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose "${{ steps.apk.outputs.path }}"

      - name: Compute APK SHA-256
        id: hash
        run: |
          SHA=$(sha256sum "${{ steps.apk.outputs.path }}" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Yammbo Music ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Yammbo Music ${{ steps.tag.outputs.tag }}

            **APK:** `${{ steps.apk.outputs.name }}`
            **SHA-256:** `${{ steps.hash.outputs.sha256 }}`

            Instala sobre la versión anterior — misma firma, misma cuenta, mismos datos.
          files: |
            ${{ steps.apk.outputs.path }}
