name: Desktop Release

# Builds platform-native installers for Yammbo Music Desktop whenever a
# v* tag is pushed (same trigger as release.yml for the Android APK).
# All three artifacts attach to the same GitHub Release by tag name:
#   Windows → YammboMusic-<tag>-win64.msi
#   macOS   → YammboMusic-<tag>-macos.dmg
#   Linux   → YammboMusic-<tag>-amd64.deb
#
# Each matrix job runs on the corresponding OS runner, downloads the
# platform-specific VLC binaries, and builds the installer via Compose
# Desktop's `packageRelease*` task. Jobs are independent: one OS failing
# does NOT block the others (fail-fast: false).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish against (e.g. v0.7.73)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            vlc_script: scripts/download-vlc-win64.sh
            gradle_task: packageReleaseMsi
            artifact_glob: '*.msi'
            asset_suffix: win64.msi

          - os: macos-latest
            name: macOS
            vlc_script: scripts/download-vlc-mac.sh
            gradle_task: packageReleaseDmg
            artifact_glob: '*.dmg'
            asset_suffix: macos.dmg

          - os: ubuntu-latest
            name: Linux
            vlc_script: scripts/download-vlc-linux-x64.sh
            gradle_task: packageReleaseDeb
            artifact_glob: '*.deb'
            asset_suffix: amd64.deb

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # Reused from the Android workflow; the desktop JVM build doesn't call
      # Firebase but the shared Gradle plugin graph references the file.
      - name: Decode google-services.json
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "::error::GOOGLE_SERVICES_JSON_BASE64 secret is missing."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > composeApp/google-services.json

      - name: Download VLC native libraries
        shell: bash
        run: bash ${{ matrix.vlc_script }}

      - name: Grant execute permission to gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build installer
        shell: bash
        run: ./gradlew :composeApp:${{ matrix.gradle_task }} --no-daemon --stacktrace

      - name: Locate installer
        id: artifact
        shell: bash
        run: |
          ARTIFACT=$(find composeApp/build/compose/binaries -name '${{ matrix.artifact_glob }}' -print -quit)
          if [ -z "$ARTIFACT" ]; then
            echo "::error::No installer produced. Tree:"
            ls -R composeApp/build/compose/binaries || true
            exit 1
          fi
          DEST="YammboMusic-${{ steps.tag.outputs.tag }}-${{ matrix.asset_suffix }}"
          cp "$ARTIFACT" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - name: Compute SHA-256
        id: hash
        shell: bash
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            SHA=$(sha256sum "${{ steps.artifact.outputs.path }}" | cut -d' ' -f1)
          else
            # macOS uses shasum instead of sha256sum
            SHA=$(shasum -a 256 "${{ steps.artifact.outputs.path }}" | cut -d' ' -f1)
          fi
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      # Attach to the release created by release.yml. `append_body: true`
      # means each matrix job adds its own section rather than overwriting.
      - name: Attach installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Yammbo Music ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          append_body: true
          body: |

            ---

            **${{ matrix.name }} Desktop:** `${{ steps.artifact.outputs.name }}`
            **SHA-256:** `${{ steps.hash.outputs.sha256 }}`
          files: |
            ${{ steps.artifact.outputs.path }}
